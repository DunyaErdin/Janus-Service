name: Edge AI CI

on:
  push:
    branches: [main, feature/hey-janus-wake]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check app tests
      - name: Pytest
        run: python -m pytest
      - name: Secret file guard
        run: |
          test ! -f .env.local
          git ls-files | grep -Ev '(^|/)\.env(\.example)?$' | grep -E '(^|/)\.env(\.|$)' && exit 1 || true
      - name: Docker build
        run: docker build -t janus-edge-ai:ci .
